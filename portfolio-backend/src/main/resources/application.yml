spring:
  datasource:
    # 连接本地 3306 端口的 portfolio_db 数据库
    url: jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456  # 你的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # 自动更新表结构
    show-sql: true     # 控制台打印 SQL 语句

